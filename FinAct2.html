<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }

        .form-paper {
            max-width: 850px;
            margin: auto;
            padding: 30px;
            background-color: #fff;
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            position: relative;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background-color: white;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            position: absolute;
            top: 30px;
            left: 30px;
            border: 2px solid black;
        }

        h2.univ-name {
            text-align: center;
            font-family: Georgia, 'Times New Roman', serif;
            font-weight: 600;
            margin-bottom: 0;
            padding-top: 10px;
        }

        h4.system {
            text-align: center;
            font-weight: 100;
            font-family: serif;
            margin-top: 0;
        }

        h1.data-sheet {
            text-align: center;
            color: rgb(112, 111, 111);
            margin-bottom: 0;
        }

        h4.desc {
            text-align: center;
            font-weight: 100;
            font-style: italic;
            margin-top: 0;
        }

        .required-note {
            margin-top: 70px;
            font-size: 14px;
            color: red;
            margin-bottom: 15px;
        }

        .form-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .form-item.top-align {
            align-items: flex-start;
        }

        .form-item label {
            width: 200px;
            min-width: 200px;
            font-size: 15px;
            padding-right: 10px;
        }

        .form-item.top-align label {
            padding-top: 4px;
        }

        .form-item input,
        .form-item select {
            flex: 1;
            height: 32px;
            padding: 4px 6px;
            border: 1px solid #000;
            outline: none;
            font-size: 14px;
            box-sizing: border-box;
            width: 100%;
            min-width: 0;
        }

        #legal-status {
            height: auto; 
            min-height: 32px;
            padding: 8px 6px;
        }

        h3.section-title {
            margin-top: 30px;
            margin-bottom: 10px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
            font-size: 15px;
        }

        .parent-info-container {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .parent-column {
            flex: 1;
        }

        .parent-column .form-item label {
            width: 140px;
            min-width: 140px;
            font-size: 13px;
        }

        .submit-container {
            margin-top: 30px;
            text-align: center;
        }

        .submit-btn {
            background-color: #333;
            color: white;
            padding: 10px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .submit-btn:hover {
            background-color: #555;
        }

        .backBtn {
			position: fixed;
			top: 20px;
			left: 20px;

			padding: 10px 14px;
			background: #cfd6df;
			border: 1px solid #b5bcc6;

			text-decoration: none;
			color: #2f2f2f;

			border-radius: 8px;
			font-size: 14px;

			box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
			transition: 0.2s ease;
		}

		.backBtn:hover {
			background: #bfc7d1;
		}
    </style>
</head>
<body>
    <a href="index.html" class="backBtn">← Back</a>
    <div class="form-paper">
        <form action="#" method="POST">
            <div class="logo-circle">Logo</div>
            <h2 class="univ-name">SAMPLE UNIVERSITY</h2>
            <h4 class="system">ENROLLMENT SYSTEM</h4>
            <h1 class="data-sheet">PERSONAL DATA SHEET</h1>
            <h4 class="desc">(Graduate School, Law, Medicine)</h4>

            <div class="required-note">* Required Fields</div>

            <div class="form-item">
                <label for="program">Program *</label>
                <select id="program" name="program" required>
                    <option value="">--Select Program--</option>
                    <option value="MAED">Master of Arts in Education (Graduate School)</option>
                    <option value="MBA">Master of Business Administration (Graduate School)</option>
                    <option value="JD">Juris Doctor (Law)</option>
                    <option value="MD">Doctor of Medicine (Medicine)</option>
                </select>
            </div>

            <div class="form-item">
                <label for="student-number">Student Number *</label>
                <input type="text" id="student-number" name="student-number" placeholder="Ex. 202612345" required>
            </div>

            <h3 class="section-title">STUDENT'S INFORMATION</h3>

            <div class="form-item">
                <label for="surname">Surname (Last Name) *</label>
                <input type="text" id="surname" name="surname" placeholder="Ex. DELA CRUZ" required>
            </div>

            <div class="form-item">
                <label for="given-name">Given Name *</label>
                <input type="text" id="given-name" name="given-name" placeholder="Ex. JOHN" required>
            </div>
            
            <div class="form-item">
                <label for="middle-name">Middle Name</label>
                <input type="text" id="middle-name" name="middle-name" placeholder="Middle Name">
            </div>

            <div class="form-item">
                <label for="aux-name">Auxilliary Name</label>
                <input type="text" id="aux-name" name="aux-name" placeholder="Ex. Sr, Jr, I, II, III, etc.">
            </div>

            <div class="form-item">
                <label for="email">E-mail adress *</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-item">
                <label for="sex">Sex</label>
                <select id="sex" name="sex">
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="form-item">
                <label for="birthplace">Birthplace</label>
                <input type="text" id="birthplace" name="birthplace">
            </div>

            <div class="form-item">
                <label for="dob">Date of Birth *</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="form-item">
                <label for="religion">Religion</label>
                <input type="text" id="religion" name="religion">
            </div>

            <div class="form-item">
                <label for="City-Add">City Address *</label>
                <input type="text" id="City-Add" name="City-Add" required>
            </div>

            <div class="form-item">
                <label for="home">Home adress *</label>
                <input type="text" id="home" name="home" required>
            </div>

            <div class="form-item">
                <label for="zip">Zip Code *</label>
                <input type="text" id="zip" name="zip" required>
            </div>

            <div class="form-item">
                <label for="Tel">Telephone Number</label>
                <input type="text" id="Tel" name="Tel">
            </div>

            <div class="form-item">
                <label for="PhoneNum">Phone Number *</label>
                <input type="text" id="PhoneNum" name="PhoneNum" required>
            </div>

            <div class="form-item">
                <label for="citizenship">Citizenship</label>
                <input type="text" id="citizenship" name="citizenship" placeholder="Ex. Filipino">
            </div>

            <div class="form-item">
                <label for="ACR">If Alien, ACR # (see Registrar):</label>
                <input type="text" id="ACR" name="ACR" placeholder="Enter your ACR #" />
            </div>

            <div class="form-item">
                <label for="civil-status">Civil Status</label>
                <select id="civil-status" name="civil-status">
                    <option value="">Select Civil Status</option>
                    <option value="single">Single</option>
                    <option value="married">Married</option>
                    <option value="divorced">Divorced</option>
                    <option value="widowed">Widowed</option>
                </select>
            </div>

            <div class="form-item top-align">
                <label for="legal-status">Legal Status *</label>
                <select id="legal-status" name="legal-status" required>
                    <option value="">Select Legal Status</option>
                    <option value="citizen">Citizen of RP</option>
                    <option value="permanent-resident">Permanent Resident</option>
                    <option value="student-visa">Person granted permission to enter and remain as a student in RP on a visa for
                        a defined period of time
                    </option>
                    <option value="family-visa">Person granted permission to enter and remain as a child or spouse of a worker on a 
                        visa for a defined period of time
                    </option>
                    <option value="other-visa">Other Visa</option>
                    <option value="unknown">Legal Status Not Known</option>
                </select>
            </div>

            <div class="form-item">
                <label for="employment-status">Employment Status</label>
                <select id="employment-status" name="employment-status">
                    <option value="">---Select---</option>
                    <option value="Employed">Employed</option>
                    <option value="Self-employed">Self-employed</option>
                    <option value="Not-Employed">Not Employed</option>
                </select>
            </div>

            <div class="form-item">
                <label for="tel-office">Office/Bus. Tel. #:</label>
                <input type="text" id="tel-office" name="tel-office" placeholder="Enter number if employed">
            </div>

            <div class="parent-info-container">
                <div class="parent-column">
                    <h3 class="section-title">FATHER'S INFORMATION</h3>
                    <div class="form-item">
                        <label for="father-surname">Surname</label>
                        <input type="text" id="father-surname" name="father-surname" placeholder="Surname/Last Name">
                    </div>
                    <div class="form-item">
                        <label for="father-firstname">First Name</label>
                        <input type="text" id="father-firstname" name="father-firstname" placeholder="First Name">
                    </div>
                    <div class="form-item">
                        <label for="father-middlename">Middle Name</label>
                        <input type="text" id="father-middlename" name="father-middlename" placeholder="Middle Name">
                    </div>
                    <div class="form-item">
                        <label for="father-auxname">Auxilliary Name</label>
                        <input type="text" id="father-auxname" name="father-auxname" placeholder="Ex. Sr, Jr, I, II, III, etc.">
                    </div>
                    <div class="form-item">
                        <label for="father-occupation">Occupation/Employment</label>
                        <input type="text" id="father-occupation" name="father-occupation" placeholder="Occupation/Employment">
                    </div>
                    <div class="form-item">
                        <label for="father-education">Educational Attainment</label>
                        <input type="text" id="father-education" name="father-education" placeholder="Ex. College, High School">
                    </div>
                    <div class="form-item">
                        <label for="father-address">Parent's Address</label>
                        <input type="text" id="father-address" name="father-address" placeholder="Address" >
                    </div>
                    <div class="form-item">
                        <label for="father-zip">Zip Code</label>
                        <input type="text" id="father-zip" name="father-zip" placeholder="Zip Code">
                    </div>
                    <div class="form-item">
                        <label for="father-tel">Telephone Number</label>
                        <input type="text" id="father-tel" name="father-tel" placeholder="Telephone Number">
                    </div>
                    <div class="form-item">
                        <label for="father-phone">Phone Number</label>
                        <input type="text" id="father-phone" name="father-phone" placeholder="Phone Number">
                    </div>
                </div>

                <div class="parent-column">
                    <h3 class="section-title">MOTHER'S INFORMATION</h3>
                    <div class="form-item">
                        <label for="mother-surname">Surname</label>
                        <input type="text" id="mother-surname" name="mother-surname" placeholder="Surname/Last Name">
                    </div>
                    <div class="form-item">
                        <label for="mother-firstname">First Name</label>
                        <input type="text" id="mother-firstname" name="mother-firstname" placeholder="First Name">
                    </div>
                    <div class="form-item">
                        <label for="mother-middlename">Middle Name</label>
                        <input type="text" id="mother-middlename" name="mother-middlename" placeholder="Middle Name">
                    </div>
                    <div class="form-item">
                        <label for="mother-auxname">Auxilliary Name</label>
                        <input type="text" id="mother-auxname" name="mother-auxname" placeholder="Ex. Sr, Jr, I, II, III, etc.">
                    </div>
                    <div class="form-item">
                        <label for="mother-occupation">Occupation/Employment</label>
                        <input type="text" id="mother-occupation" name="mother-occupation" placeholder="Occupation/Employment">
                    </div>
                    <div class="form-item">
                        <label for="mother-education">Educational Attainment</label>
                        <input type="text" id="mother-education" name="mother-education" placeholder="Ex. College, High School">
                    </div>
                    <div class="form-item">
                        <label for="mother-address">Parent's Address</label>
                        <input type="text" id="mother-address" name="mother-address" placeholder="Address">
                    </div>
                    <div class="form-item">
                        <label for="mother-zip">Zip Code</label>
                        <input type="text" id="mother-zip" name="mother-zip" placeholder="Zip Code">
                    </div>
                    <div class="form-item">
                        <label for="mother-tel">Telephone Number</label>
                        <input type="text" id="mother-tel" name="mother-tel" placeholder="Telephone Number">
                    </div>
                    <div class="form-item">
                        <label for="mother-num">Phone Number</label>
                        <input type="text" id="mother-num" name="mother-num" placeholder="Phone Number">
                    </div>
                </div>
            </div>

            <h3 class="section-title">GUARDIAN'S INFORMATION (If Applicable)</h3>
            
            <div class="form-item">
                <label for="guardian-surname">Surname</label>
                <input type="text" id="guardian-surname" name="guardian-surname" placeholder="Surname">
            </div>
            <div class="form-item">
                <label for="guardian-firstname">First Name</label>
                <input type="text" id="guardian-firstname" name="guardian-firstname" placeholder="First Name">
            </div>
            <div class="form-item">
                <label for="guardian-middlename">Middle Name</label>
                <input type="text" id="guardian-middlename" name="guardian-middlename" placeholder="Middle Name">
            </div>
            <div class="form-item">
                <label for="guardian-auxname">Auxiliary Name</label>
                <input type="text" id="guardian-auxname" name="guardian-auxname" placeholder="Ex. Sr, Jr, I, II, III, etc.">
            </div>
            <div class="form-item">
                <label for="guardian-occupation">Occupation/Employment</label>
                <input type="text" id="guardian-occupation" name="guardian-occupation" placeholder="Occupation/Employment">
            </div>
            <div class="form-item">
                <label for="guardian-bustel">Off./Bus. Tel. #</label>
                <input type="text" id="guardian-bustel" name="guardian-bustel" placeholder="Telephone Number">
            </div>
            <div class="form-item">
                <label for="guardian-address">Guardian's Address</label>
                <input type="text" id="guardian-address" name="guardian-address" placeholder="Address">
            </div>
            <div class="form-item">
                <label for="guardian-zip">Zip Code</label>
                <input type="text" id="guardian-zip" name="guardian-zip" placeholder="Zip Code">
            </div>
            <div class="form-item">
                <label for="guardian-tel">Tel #</label>
                <input type="text" id="guardian-tel" name="guardian-tel" placeholder="Telephone Number">
            </div>
            <div class="form-item">
                <label for="guardian-phone">Phone Number</label>
                <input type="text" id="guardian-phone" name="guardian-phone" placeholder="Phone Number">
            </div>

            <div class="submit-container">
                <button type="submit" class="submit-btn">Submit Application</button>
            </div>

        </form>
    </div>
</body>
</html>
