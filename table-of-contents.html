<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Table of Contents</title>

    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background-color: #dfe4ea;
            color: #2f2f2f;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background-color: #cfd6df;
            border-bottom: 1px solid #b5bcc6;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        section {
            background-color: #f7f8fa;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #b5bcc6;
        }

        h1 {
            text-align: center;
            margin: 0;
            font-size: 32px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .main {
            list-style-type: upper-alpha;
            font-size: 18px;
        }

        .topic {
            list-style-type: upper-roman;
        }

        .subtopic {
            list-style-type: lower-roman;
        }

        .mini {
            list-style-type: disc;
        }

        .backBtn {
            position: fixed;
            top: 20px;
            left: 20px;

            padding: 10px 14px;
            background: #cfd6df;
            border: 1px solid #b5bcc6;

            text-decoration: none;
            color: #2f2f2f;

            border-radius: 8px;
            font-size: 14px;

            box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
            transition: 0.2s ease;
        }

        .backBtn:hover {
            background: #bfc7d1;
        }
    </style>
</head>
<body>
    <a href="index.html" class="backBtn">← Back</a>
    <header>
        <h1>Table of Contents</h1>
    </header>
    <div class="container">
        <section>
            <h2>LIST</h2>
            <ol class="main">
                <li>Main Topic 1</li>
                <li>Main Topic 2
                    <ol class="topic">
                        <li>Topic 1</li>
                        <li>Topic 2</li>
                        <ul>
                            <li>Subtopic 1</li>
                            <li>Subtopic 2</li>
                        </ul>
                        <li>Topic 3</li>
                        <ol class="subtopic">
                            <li>Subtopic 1</li>
                            <li>Subtopic 2</li>
                            <ul class="mini">
                                <li>Mini Topic 1</li>
                                <li>Mini Topic 2</li>
                            </ul>
                            <li>Subtopic 3</li>
                        </ol>
                    </ol>
                </li>
                <li>Main Topic 3</li>
            </ol>
        </section>
    </div>
</body>
</html>
